<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Sentimentos AI</title>
    <link rel="stylesheet" href="projeto.css">
</head>
<body>

    <main class="container">
        <h1>Sistema de Análise de Sentimentos</h1>
        
        <section class="input-section">
            <textarea placeholder="Digite seu texto aqui para analisar..."></textarea>
            <button class="btn-analisar">Analisar Sentimento</button>
        </section>

        <section class="results-container">
            <div class="card positivo">
                <p>Positivo</p>
            </div>
            <div class="card neutro">
                <p>Neutro</p>
            </div>
            <div class="card negativo">
                <p>Negativo</p>
            </div>
        </section>
    </main>

</body>
</html>
